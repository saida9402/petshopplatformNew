events {
    worker_connections 1024;
}

http {

# ══════════════════════════════════════════════════════════════════════════════
# Petoria — Nginx production configuration
#
# Architecture:
#   Internet → Nginx (80/443) → petoria-api:3002 (internal Docker network)
#
# Responsibilities:
#   • TLS termination (Let's Encrypt certificates)
#   • HTTP → HTTPS redirect
#   • Reverse proxy for /graphql (HTTP + multipart uploads)
#   • WebSocket proxy for ws:// connections (NestJS WsAdapter on same port)
#   • Static file serving for /uploads (bypasses Node.js entirely)
# ══════════════════════════════════════════════════════════════════════════════

# ── WebSocket upgrade mapping ──────────────────────────────────────────────────
# When a client sends "Upgrade: websocket", this sets Connection to "upgrade".
# For regular HTTP requests (no Upgrade header), it sets Connection to "close".
# Applied to every proxy_pass location via $connection_upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Upstream ───────────────────────────────────────────────────────────────────
# "petoria-api" resolves to the container IP via Docker's internal DNS.
upstream petoria_api {
    server petoria-api:3002;
    keepalive 32;
}

# ══════════════════════════════════════════════════════════════════════════════
# HTTP — redirect all traffic to HTTPS
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge must pass through before the redirect.
    # certbot --webroot places challenge files here.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# HTTPS — main server block
# Replace YOUR_DOMAIN_HERE with the actual domain (e.g. petoria.example.com)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN_HERE;

    # ── TLS certificates (mounted from host via Docker volume) ────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # ── TLS hardening ─────────────────────────────────────────────────────────
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # ── Security headers ──────────────────────────────────────────────────────
    # These supplement the helmet headers set by the NestJS application.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                                          always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;

    # ── Request size limit ────────────────────────────────────────────────────
    # Must exceed the NestJS graphql-upload maxFileSize (15 MB).
    # Applied globally; the /graphql location handles multipart.
    client_max_body_size 20M;

    # ── GraphQL endpoint ──────────────────────────────────────────────────────
    # Handles all API calls including file uploads (multipart/form-data).
    # Also carries WebSocket Upgrade headers in case a client connects here,
    # though the NestJS WsAdapter accepts upgrades on any path.
    location /graphql {
        proxy_pass         http://petoria_api;
        proxy_http_version 1.1;

        # WebSocket upgrade support (shared with / below)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Standard proxy headers — NestJS reads X-Forwarded-For for real IP
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Extended timeout for large file uploads (15 MB at ~5 Mbps ≈ 24 s)
        proxy_read_timeout    120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;

        # Disable buffering for streaming GraphQL responses
        proxy_buffering off;
    }

    # ── WebSocket root connection ──────────────────────────────────────────────
    # NestJS WsAdapter binds to the same HTTP port (3002).
    # Clients connect with: ws://domain.com?token=<jwt>
    # Nginx detects the Upgrade header and holds the connection open.
    location / {
        proxy_pass         http://petoria_api;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections must stay open; 1 hour covers any realistic session
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Static uploads ────────────────────────────────────────────────────────
    # Served directly by Nginx from the shared Docker volume — NestJS is never
    # involved. This eliminates the Node.js overhead for every image request.
    #
    # File names are UUIDs generated at upload time, so they are effectively
    # immutable. "Cache-Control: immutable" tells browsers never to revalidate.
    location /uploads/ {
        # "alias" replaces the /uploads/ prefix with the filesystem path.
        # Trailing slash on both sides is required for correct path resolution.
        alias /app/uploads/;

        # Security: prevent directory listing
        autoindex off;

        # 7-day browser cache + immutable hint (UUID filenames never change)
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;

        # Defense against MIME-sniffing attacks on uploaded content
        add_header X-Content-Type-Options "nosniff" always;

        # crossOriginResourcePolicy is set by NestJS helmet to cross-origin,
        # which allows the frontend to load images from this domain.
    }
}
}